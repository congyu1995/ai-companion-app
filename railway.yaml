services:
  ai-companion:
    build:
      context: .
      dockerfile: Dockerfile.railway
    ports:
      - port: 3000
        httpSupport: true
    healthcheck:
      path: /api/health
      interval: 30s
      timeout: 10s
      retries: 3
    dependsOn:
      - postgres
      - redis
    env:
      - NODE_ENV=production
      - PORT=3000

  postgres:
    image: postgres:15-alpine
    env:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=aicompanion
    ports:
      - port: 5432
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
      - type: bind
        source: ./docker/init.sql
        target: /docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - port: 6379
    volumes:
      - type: volume
        source: redis_data
        target: /data

volumes:
  postgres_data:
  redis_data: