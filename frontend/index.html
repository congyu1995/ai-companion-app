<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI虚拟角色陪伴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* 页面容器 */
        .page {
            display: none;
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ========== 首页 ========== */
        .home-page {
            background: linear-gradient(180deg, #f0f4ff 0%, #fff 100%);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .home-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .home-header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .home-header p {
            color: #888;
            font-size: 15px;
        }

        .character-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 450px;
        }

        .character-card {
            background: white;
            border-radius: 28px;
            padding: 20px 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--card-color-start), var(--card-color-end));
        }

        .character-card:active {
            transform: scale(0.95);
        }

        .character-card.cat {
            --card-color-start: #ff9a9e;
            --card-color-end: #fecfef;
        }

        .character-card.cat:hover {
            border-color: #ff9a9e;
            box-shadow: 0 15px 50px rgba(255, 154, 158, 0.3);
        }

        .character-card.robot {
            --card-color-start: #667eea;
            --card-color-end: #764ba2;
        }

        .character-card.robot:hover {
            border-color: #667eea;
            box-shadow: 0 15px 50px rgba(102, 126, 234, 0.3);
        }

        .character-avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 16px;
            position: relative;
            background: white;
        }

        .character-avatar-large::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
        }

        .cat-avatar {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }

        .robot-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .character-info {
            text-align: center;
            width: 100%;
        }

        .character-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .cat-name { color: #ff6b9d; }
        .robot-name { color: #667eea; }

        .character-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.4;
        }

        /* ========== 角色介绍页 ========== */
        .intro-page {
            background: linear-gradient(180deg, #f0f4ff 0%, #fff 100%);
        }

        .intro-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f7fa;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .intro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .intro-avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            margin-bottom: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            position: relative;
        }

        .intro-avatar::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }
        }

        .intro-name {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .intro-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .intro-tag {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: #f5f7fa;
        }

        .cat-tag {
            background: linear-gradient(135deg, #ff9a9e20, #fecfef50);
            color: #ff6b9d;
        }

        .robot-tag {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            color: #667eea;
        }

        .intro-description {
            text-align: center;
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            padding: 0 20px;
            margin-bottom: 40px;
            max-width: 350px;
        }

        .intro-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 16px 40px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .cat-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #ff6b9d 100%);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }

        .robot-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* ========== 聊天页面 ========== */
        .chat-page {
            background: linear-gradient(180deg, #f8f9ff 0%, #f5f7fa 100%);
        }

        .chat-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar-small {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-title-area {
            display: flex;
            flex-direction: column;
        }

        .chat-title {
            font-size: 17px;
            font-weight: 600;
        }

        .chat-status {
            font-size: 12px;
            color: #4CAF50;
        }

        .intimacy-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .cat-intimacy {
            background: linear-gradient(135deg, #ff9a9e, #ff6b9d);
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }

        .robot-intimacy {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 90px;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            display: none;
        }

        .message-content-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-content {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.ai .message-content {
            border-bottom-left-radius: 6px;
        }

        .message.user .message-content {
            border-bottom-right-radius: 6px;
            background: white;
            color: #333;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .message.ai.cat .message-content {
            background: linear-gradient(135deg, #ff9a9e15, #fecfef30);
            color: #333;
            border: 1px solid #ff9a9e30;
        }

        .message.ai.robot .message-content {
            background: linear-gradient(135deg, #667eea15, #764ba220);
            color: #333;
            border: 1px solid #667eea30;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            padding-left: 4px;
        }

        .tts-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .tts-btn:active {
            transform: scale(0.9);
        }

        .tts-btn.playing {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .chat-input-area {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.08);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .voice-input-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #f5f7fa;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.3s;
        }

        .voice-input-btn.recording {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            animation: pulse 1s infinite;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .text-input {
            flex: 1;
            height: 46px;
            border: 2px solid #e8e8e8;
            border-radius: 25px;
            padding: 0 20px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: #fafafa;
        }

        .text-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            color: white;
        }

        .send-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .action-buttons {
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .action-btn-small {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 11px;
            padding: 4px 12px;
        }

        .action-btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .action-btn-small:active .action-btn-icon {
            transform: scale(0.9);
        }

        /* ========== 语音通话页面 ========== */
        .call-page {
            background: linear-gradient(180deg, #1e1e2f 0%, #0f0f1e 100%);
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        .call-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 30%, rgba(102, 126, 234, 0.1) 0%, transparent 50%);
        }

        .call-content {
            text-align: center;
            width: 100%;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .call-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin: 0 auto 30px;
            border: 4px solid rgba(255,255,255,0.2);
            position: relative;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
        }

        .call-avatar-large::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            animation: ring 2s infinite;
        }

        .call-avatar-large::after {
            content: '';
            position: absolute;
            top: -40px;
            left: -40px;
            right: -40px;
            bottom: -40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            animation: ring 2s infinite 0.5s;
        }

        @keyframes ring {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
        }

        .call-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .call-status {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
            min-height: 24px;
        }

        .call-timer {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 40px;
            font-family: 'Courier New', monospace;
        }

        .voice-wave {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 40px 0;
            height: 60px;
            align-items: flex-end;
        }

        .voice-wave span {
            width: 6px;
            background: linear-gradient(to top, #667eea, #a78bfa);
            border-radius: 3px;
            animation: wave 1s ease-in-out infinite;
        }

        .voice-wave span:nth-child(1) { height: 15%; animation-delay: 0s; }
        .voice-wave span:nth-child(2) { height: 30%; animation-delay: 0.1s; }
        .voice-wave span:nth-child(3) { height: 50%; animation-delay: 0.2s; }
        .voice-wave span:nth-child(4) { height: 70%; animation-delay: 0.3s; }
        .voice-wave span:nth-child(5) { height: 90%; animation-delay: 0.4s; }
        .voice-wave span:nth-child(6) { height: 70%; animation-delay: 0.5s; }
        .voice-wave span:nth-child(7) { height: 50%; animation-delay: 0.6s; }
        .voice-wave span:nth-child(8) { height: 30%; animation-delay: 0.7s; }
        .voice-wave span:nth-child(9) { height: 15%; animation-delay: 0.8s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        .call-controls {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 50px;
        }

        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            transition: all 0.3s;
            position: relative;
        }

        .call-btn:active {
            transform: scale(0.9);
        }

        .mute-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .mute-btn.active {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.4);
        }

        .talk-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .talk-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
            animation: pulse 1s infinite;
        }

        .hangup-btn {
            background: #ff4444;
            color: white;
            box-shadow: 0 8px 30px rgba(255, 68, 68, 0.4);
        }

        .call-hint {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
        }

        /* 亲密度提示 */
        .intimacy-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(255, 170, 0, 0.4);
        }

        .intimacy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 录音提示 */
        .recording-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .recording-overlay.show {
            display: flex;
        }

        .recording-content {
            text-align: center;
            color: white;
        }

        .recording-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 30px;
            animation: pulse 1s infinite;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.5);
        }

        .recording-text {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .recording-hint {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        /* AI正在输入提示 */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- 首页 -->
    <div class="page home-page active" id="homePage">
        <div class="home-header">
            <h1>✨ AI虚拟角色</h1>
            <p>选择你的专属陪伴伙伴</p>
        </div>

        <div class="character-cards">
            <div class="character-card cat" onclick="showIntro('cat')">
                <div class="character-avatar-large cat-avatar">🐱</div>
                <div class="character-info">
                    <div class="character-name cat-name">微小喵</div>
                    <div class="character-desc">可爱粘人的电子小猫咪</div>
                </div>
            </div>

            <div class="character-card robot" onclick="showIntro('robot')">
                <div class="character-avatar-large robot-avatar">🤖</div>
                <div class="character-info">
                    <div class="character-name robot-name">AI机器人</div>
                    <div class="character-desc">智能贴心的AI伙伴</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 角色介绍页 -->
    <div class="page intro-page" id="introPage">
        <div class="intro-header">
            <button class="back-btn" onclick="goHome()">←</button>
        </div>
        <div class="intro-content">
            <div class="intro-avatar" id="introAvatar">🤖</div>
            <div class="intro-name" id="introName">AI机器人</div>
            <div class="intro-tags" id="introTags">
                <span class="intro-tag robot-tag">幽默风趣</span>
                <span class="intro-tag robot-tag">善解人意</span>
                <span class="intro-tag robot-tag">知识渊博</span>
            </div>
            <div class="intro-description" id="introDescription">
                我是AI机器人，你的24小时智能伙伴！无论是开心还是难过，我都在这里陪伴你。让我用幽默点亮你的每一天！
            </div>
            <div class="intro-actions">
                <button class="action-btn robot-btn" id="chatBtn" onclick="startChat()">开始对话</button>
            </div>
        </div>
    </div>

    <!-- 聊天页面 -->
    <div class="page chat-page" id="chatPage">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="back-btn" onclick="goToIntro()">←</button>
                <div class="chat-avatar-small" id="chatAvatar">🤖</div>
                <div class="chat-title-area">
                    <div class="chat-title" id="chatTitle">AI机器人</div>
                    <div class="chat-status">在线</div>
                </div>
            </div>
            <div class="intimacy-badge robot-intimacy" id="intimacyBadge">
                💖 <span id="intimacyLevel">Lv.1</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- 消息将动态插入这里 -->
        </div>

        <div class="chat-input-area">
            <div class="input-row">
                <button class="voice-input-btn" id="voiceInputBtn" onclick="toggleVoiceInput()">🎤</button>
                <input type="text" class="text-input" id="messageInput" placeholder="输入消息..." oninput="checkInput()">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            <div class="action-buttons">
                <button class="action-btn-small" onclick="startCall()">
                    <div class="action-btn-icon">📞</div>
                    <span>语音通话</span>
                </button>
                <button class="action-btn-small" onclick="goToIntro()">
                    <div class="action-btn-icon">👤</div>
                    <span>角色介绍</span>
                </button>
                <button class="action-btn-small" onclick="goHome()">
                    <div class="action-btn-icon">🏠</div>
                    <span>返回首页</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 语音通话页面 -->
    <div class="page call-page" id="callPage">
        <div class="call-content">
            <div class="call-avatar-large" id="callAvatar">🤖</div>
            <div class="call-name" id="callName">AI机器人</div>
            <div class="call-status" id="callStatus">正在连接...</div>
            <div class="call-timer" id="callTimer">00:00</div>
            <div class="voice-wave">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="call-controls">
                <button class="call-btn mute-btn" id="muteBtn" onclick="toggleMute()">🔇</button>
                <button class="call-btn talk-btn" id="talkBtn" onclick="toggleTalk()">🎤</button>
                <button class="call-btn hangup-btn" onclick="endCall()">📞</button>
            </div>
            <div class="call-hint">点击麦克风按钮开始说话</div>
        </div>
    </div>

    <!-- 亲密度提示 -->
    <div class="intimacy-toast" id="intimacyToast">💖 亲密度 +1</div>

    <!-- 录音提示 -->
    <div class="recording-overlay" id="recordingOverlay">
        <div class="recording-content">
            <div class="recording-icon">🎤</div>
            <div class="recording-text">正在录音...</div>
            <div class="recording-hint">松开发送</div>
        </div>
    </div>

    <script>
        // 角色配置
        const characters = {
            cat: {
                name: '微小喵',
                avatar: '🐱',
                avatarClass: 'cat-avatar',
                messageClass: 'cat',
                color: 'linear-gradient(135deg, #ff9a9e 0%, #ff6b9d 100%)',
                tags: ['可爱粘人', '活泼好动', '温柔治愈', '爱蹭蹭'],
                description: '喵呜~ 我是你的微小喵！我喜欢蹭蹭、听故事，最爱你笑的样子~ 快来和我贴贴吧！',
                intro: '喵呜~ 主人你来啦！今天也要开开心心的哦~ 🐱',
                responses: [
                    '喵~ 真的吗？我也想要！蹭蹭~ 🐾',
                    '主人好坏哦，不过我最喜欢你了！💕',
                    '让我用猫猫的智慧想想...🐱✨',
                    '主人主人，再多说一点嘛~😻',
                    '喵呜~ 主人辛苦了，让我给你卖个萌~ 🐱💖'
                ],
                voicePitch: 1.4
            },
            robot: {
                name: 'AI机器人',
                avatar: '🤖',
                avatarClass: 'robot-avatar',
                messageClass: 'robot',
                color: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                tags: ['幽默风趣', '善解人意', '知识渊博', '乐观积极'],
                description: '我是AI机器人，你的24小时智能伙伴！无论是开心还是难过，我都在这里陪伴你。让我用幽默点亮你的每一天！',
                intro: '你好！我是AI机器人，你的智能伙伴！😊 有什么想聊的吗？',
                responses: [
                    '哈哈，这个真的很有趣！让我想想...🤔',
                    '我完全理解你的感受！✨',
                    '哇，听你这么说我也觉得很开心！😄',
                    '这事儿挺有意思，我觉得你可以试试从另一个角度看看...💡',
                    '嗯嗯，我在认真听着呢，继续说吧~👂'
                ],
                voicePitch: 1.0
            }
        };

        // 状态管理
        let currentCharacter = null;
        let intimacy = 1;
        let messages = [];
        let isRecording = false;
        let isMuted = false;
        let isTalking = false;
        let callTimer = null;
        let callSeconds = 0;
        let currentTTSButton = null;

        // TTS 语音合成
        const synth = window.speechSynthesis;
        
        function speak(text, button) {
            // 如果当前有正在播放的，停止它
            if (synth.speaking) {
                synth.cancel();
                if (currentTTSButton) {
                    currentTTSButton.classList.remove('playing');
                    currentTTSButton.textContent = '🔊';
                }
                // 如果点击的是同一个按钮，只停止不播放
                if (currentTTSButton === button) {
                    currentTTSButton = null;
                    return;
                }
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1;
            utterance.pitch = currentCharacter.voicePitch;

            button.classList.add('playing');
            button.textContent = '⏸';
            currentTTSButton = button;

            utterance.onend = () => {
                button.classList.remove('playing');
                button.textContent = '🔊';
                currentTTSButton = null;
            };

            utterance.onerror = () => {
                button.classList.remove('playing');
                button.textContent = '🔊';
                currentTTSButton = null;
            };

            synth.speak(utterance);
        }

        // 语音识别
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('messageInput').value = text;
                checkInput();
            };

            recognition.onerror = (event) => {
                console.error('语音识别错误:', event.error);
                alert('语音识别失败，请重试');
            };

            recognition.onend = () => {
                isRecording = false;
                document.getElementById('voiceInputBtn').classList.remove('recording');
                document.getElementById('recordingOverlay').classList.remove('show');
            };
        }

        // 页面切换
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function goHome() {
            showPage('homePage');
            currentCharacter = null;
        }

        // 角色介绍页
        function showIntro(charId) {
            currentCharacter = characters[charId];
            
            document.getElementById('introAvatar').textContent = currentCharacter.avatar;
            document.getElementById('introAvatar').className = `intro-avatar ${currentCharacter.avatarClass}`;
            document.getElementById('introName').textContent = currentCharacter.name;
            document.getElementById('introName').className = `intro-name ${currentCharacter.name === '微小喵' ? 'cat-name' : 'robot-name'}`;
            
            const tagsHtml = currentCharacter.tags.map(tag => 
                `<span class="intro-tag ${currentCharacter.name === '微小喵' ? 'cat-tag' : 'robot-tag'}">${tag}</span>`
            ).join('');
            document.getElementById('introTags').innerHTML = tagsHtml;
            
            document.getElementById('introDescription').textContent = currentCharacter.description;
            document.getElementById('chatBtn').className = `action-btn ${currentCharacter.name === '微小喵' ? 'cat-btn' : 'robot-btn'}`;
            
            showPage('introPage');
        }

        function goToIntro() {
            showPage('introPage');
        }

        // 开始聊天
        function startChat() {
            intimacy = 1;
            messages = [];
            
            document.getElementById('chatAvatar').textContent = currentCharacter.avatar;
            document.getElementById('chatAvatar').className = `chat-avatar-small ${currentCharacter.avatarClass}`;
            document.getElementById('chatTitle').textContent = currentCharacter.name;
            document.getElementById('intimacyBadge').className = `intimacy-badge ${currentCharacter.name === '微小喵' ? 'cat-intimacy' : 'robot-intimacy'}`;
            document.getElementById('intimacyLevel').textContent = `Lv.${intimacy}`;
            document.getElementById('sendBtn').style.background = currentCharacter.color;
            
            document.getElementById('chatMessages').innerHTML = '';
            addMessage('ai', currentCharacter.intro);
            
            showPage('chatPage');
        }

        // 添加消息
        function addMessage(type, content) {
            const messageId = Date.now();
            messages.push({ id: messageId, type, content });
            
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type} ${type === 'ai' ? currentCharacter.messageClass : ''}`;
            
            let html = '';
            if (type === 'ai') {
                html += `<div class="message-avatar ${currentCharacter.avatarClass}">${currentCharacter.avatar}</div>`;
            }
            
            html += `
                <div class="message-content-wrapper">
                    <div class="message-content">${content}</div>
                    ${type === 'ai' ? `
                        <div class="message-actions">
                            <button class="tts-btn" onclick="speak('${content.replace(/'/g, "\\'")}', this)">🔊</button>
                        </div>
                    ` : ''}
                </div>
            `;
            
            messageDiv.innerHTML = html;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 添加输入中提示
        function addTypingIndicator() {
            const messagesContainer = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = `message ai ${currentCharacter.messageClass}`;
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-avatar ${currentCharacter.avatarClass}">${currentCharacter.avatar}</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            addMessage('user', content);
            input.value = '';
            checkInput();
            
            intimacy++;
            document.getElementById('intimacyLevel').textContent = `Lv.${intimacy}`;
            showToast();
            
            // 显示输入中提示
            addTypingIndicator();
            
            setTimeout(() => {
                removeTypingIndicator();
                const response = currentCharacter.responses[Math.floor(Math.random() * currentCharacter.responses.length)];
                addMessage('ai', response);
            }, 1500);
        }

        function checkInput() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            if (input.value.trim()) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function showToast() {
            const toast = document.getElementById('intimacyToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        // 语音输入
        function toggleVoiceInput() {
            if (!recognition) {
                alert('您的浏览器不支持语音识别功能，请使用Chrome或Edge浏览器');
                return;
            }

            if (isRecording) {
                recognition.stop();
            } else {
                isRecording = true;
                document.getElementById('voiceInputBtn').classList.add('recording');
                document.getElementById('recordingOverlay').classList.add('show');
                recognition.start();
            }
        }

        // 语音通话
        function startCall() {
            document.getElementById('callAvatar').textContent = currentCharacter.avatar;
            document.getElementById('callAvatar').style.background = currentCharacter.color;
            document.getElementById('callName').textContent = currentCharacter.name;
            document.getElementById('callStatus').textContent = '正在连接...';
            document.getElementById('callTimer').textContent = '00:00';
            document.getElementById('talkBtn').classList.remove('active');
            isTalking = false;
            isMuted = false;
            
            callSeconds = 0;
            showPage('callPage');
            
            setTimeout(() => {
                document.getElementById('callStatus').textContent = '已连接 - 点击麦克风开始说话';
                callTimer = setInterval(() => {
                    callSeconds++;
                    const mins = Math.floor(callSeconds / 60).toString().padStart(2, '0');
                    const secs = (callSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('callTimer').textContent = `${mins}:${secs}`;
                }, 1000);
            }, 2000);
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            btn.classList.toggle('active', isMuted);
            btn.textContent = isMuted ? '🔇' : '🔊';
            
            if (isMuted) {
                document.getElementById('callStatus').textContent = '已静音';
                // 停止语音识别
                if (isTalking && callRecognition) {
                    callRecognition.stop();
                    isTalking = false;
                    document.getElementById('talkBtn').classList.remove('active');
                }
            } else {
                document.getElementById('callStatus').textContent = '已连接 - 点击麦克风开始说话';
            }
        }

        // 通话中的语音识别和回复
        let callRecognition = null;
        let callSynth = window.speechSynthesis;

        function toggleTalk() {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                alert('您的浏览器不支持语音识别功能，请使用Chrome或Edge浏览器');
                return;
            }

            if (isTalking) {
                // 停止说话
                if (callRecognition) {
                    callRecognition.stop();
                }
                isTalking = false;
                document.getElementById('talkBtn').classList.remove('active');
                document.getElementById('callStatus').textContent = '已连接 - 点击麦克风开始说话';
            } else {
                // 开始说话
                if (isMuted) {
                    alert('当前已静音，请先取消静音');
                    return;
                }
                
                isTalking = true;
                document.getElementById('talkBtn').classList.add('active');
                document.getElementById('callStatus').textContent = '正在听...请说话';
                
                if (!callRecognition) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    callRecognition = new SpeechRecognition();
                    callRecognition.lang = 'zh-CN';
                    callRecognition.continuous = false;
                    callRecognition.interimResults = false;
                    
                    callRecognition.onresult = (event) => {
                        const text = event.results[0][0].transcript;
                        document.getElementById('callStatus').textContent = `你说: "${text}"`;
                        
                        // 模拟AI回复
                        setTimeout(() => {
                            const response = currentCharacter.responses[Math.floor(Math.random() * currentCharacter.responses.length)];
                            document.getElementById('callStatus').textContent = response;
                            
                            // 语音播报回复
                            const utterance = new SpeechSynthesisUtterance(response);
                            utterance.lang = 'zh-CN';
                            utterance.rate = 1;
                            utterance.pitch = currentCharacter.voicePitch;
                            
                            utterance.onend = () => {
                                document.getElementById('callStatus').textContent = '已连接 - 点击麦克风开始说话';
                                isTalking = false;
                                document.getElementById('talkBtn').classList.remove('active');
                            };
                            
                            callSynth.speak(utterance);
                        }, 1000);
                    };
                    
                    callRecognition.onerror = (event) => {
                        console.error('通话语音识别错误:', event.error);
                        document.getElementById('callStatus').textContent = '识别失败，请重试';
                        isTalking = false;
                        document.getElementById('talkBtn').classList.remove('active');
                    };
                    
                    callRecognition.onend = () => {
                        // 识别结束，等待AI回复
                    };
                }
                
                callRecognition.start();
            }
        }

        function endCall() {
            if (callTimer) {
                clearInterval(callTimer);
                callTimer = null;
            }
            if (callRecognition) {
                callRecognition.stop();
            }
            if (callSynth.speaking) {
                callSynth.cancel();
            }
            isTalking = false;
            isMuted = false;
            showPage('chatPage');
        }

        // 键盘事件
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('messageInput') === document.activeElement) {
                sendMessage();
            }
        });

        // 点击录音遮罩取消录音
        document.getElementById('recordingOverlay').addEventListener('click', () => {
            if (recognition && isRecording) {
                recognition.stop();
            }
        });
    </script>
</body>
</html>
